name: Build Statlight Game Engine

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pygame

      - name: Build App
        run: |
          pyinstaller \
            --windowed \
            --onedir \
            --name StatlightGameEngine \
            main.py

      - name: Zip App
        run: |
          cd dist
          zip -r StatlightGameEngine-macOS.zip StatlightGameEngine.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StatlightGameEngine-macOS
          path: dist/StatlightGameEngine-macOS.zip
